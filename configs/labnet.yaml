# lightning.pytorch==2.0.0
seed_everything: 42

data:
  class_path: src.data.SEDataModule
  init_args:
    db_path: "data/metadata.db"
    batch_size: 1
    num_workers: 8
    target_sr: 16000

model:
  class_path: src.modules.se_module.SEModule
  init_args:
    target_type: "aligned_dry"  # Dereverberation
    sample_rate: 16000
    num_val_samples_to_log: 4
    # 1. Define the LABNet Model
    model:
      class_path: src.models.LABNet
      init_args:
        in_channels: 5       # air 4ch + BCM 1ch
        num_channels: 16     # U-Net hidden channels
        n_fft: 512
        hop_length: 256
        win_length: 512
        compress_factor: 0.3 # power compression factor

    # 2. Define the Loss Function (LiSenNet §II.F)
    loss:
      class_path: src.modules.losses.LABNetLoss
      init_args:
        n_fft: 512
        hop_length: 256
        win_length: 512
        compress_factor: 0.3   # power compression ratio c
        lambda_mag: 0.9        # L_mag weight
        lambda_comp: 0.1       # L_comp weight

    # 3. Optimization Settings
    optimizer_config:
      lr: 5e-4
      weight_decay: 1e-2
    scheduler_config:
      warmup_epochs: 5
      min_lr: 1e-6

trainer:
  default_root_dir: "results"
  max_epochs: 100
  accelerator: "gpu"
  devices: "auto"
  strategy: "ddp"
  precision: "16-mixed"
  gradient_clip_val: 5.0
  log_every_n_steps: 10
  check_val_every_n_epoch: 1
  logger:
    class_path: lightning.pytorch.loggers.MLFlowLogger
    init_args:
      experiment_name: "Architecture"
      run_name: "LABNet-5ch-unet"
      tracking_uri: "file:./results/mlruns"
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: "val_loss"
        mode: "min"
        save_top_k: 1
        filename: "best-model-{epoch:02d}-{val_loss:.2f}"
    - class_path: src.callbacks.gpu_stats_monitor.GPUStatsMonitor
      init_args:
        device_index: 0
    - class_path: src.callbacks.audio_prediction_writer.AudioPredictionWriter
      init_args:
        output_dir: "results/predictions"
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: "val_loss"
        patience: 10
        mode: "min"
        verbose: True
    - class_path: src.callbacks.mlflow_auto_tag.MLflowAutoTagCallback
    - class_path: lightning.pytorch.callbacks.TQDMProgressBar
      init_args:
        refresh_rate: 10
