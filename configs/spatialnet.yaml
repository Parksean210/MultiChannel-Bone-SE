# lightning.pytorch==2.0.0
seed_everything: 42

data:
  class_path: src.data.SEDataModule
  init_args:
    db_path: "data/metadata.db"
    batch_size: 4                 # SpatialNet은 메모리 소모가 크므로 배치 사이즈 축소
    num_workers: 8
    target_sr: 16000

model:
  class_path: src.modules.se_module.SEModule
  init_args:
    target_type: "aligned_dry"    # 잔향 제거(Dereverberation) 타겟
    sample_rate: 16000
    num_val_samples_to_log: 4
    
    # 1. SpatialNet-Small Model 설정
    model:
      class_path: src.models.SpatialNet # 작성한 SpatialNet 클래스 경로
      init_args:
        in_channels: 5            # M: 마이크 수 (예: AR Glass 6채널 어레이)
        out_channels: 1           # P: 타겟 화자 수
        n_fft: 512                # 16kHz 기준 32ms 윈도우 
        hop_length: 256           # 16ms 이동 간격 
        num_blocks: 8             # L: 반복 블록 수 (Small 버전) [cite: 290]
        C: 96                     # 기본 Hidden 차원 [cite: 291]
        C_prime: 192              # T-ConvFFN 내부 확장 차원 [cite: 291]
        C_pp: 8                   # Full-band 모듈 압축 차원 [cite: 291]

    # 2. Loss Function (논문의 근본과 실전 타협점)
    loss:
      class_path: src.modules.losses.CompositeLoss
      init_args:
        alpha: 0.1                # SI-SDR + 0.1 * MR-STFT
        use_f_weight: false

    # 3. Optimization
    optimizer_config:
      lr: 1e-3
      weight_decay: 1e-5
    scheduler_config:
      warmup_epochs: 5
      min_lr: 1e-6

trainer:
  default_root_dir: "results"
  max_epochs: 50
  accelerator: "gpu"
  devices: "auto"
  strategy: "ddp"
  precision: "16-mixed"           # 메모리 절약을 위한 Mixed Precision
  gradient_clip_val: 5.0
  log_every_n_steps: 10
  check_val_every_n_epoch: 1
  logger:
    class_path: lightning.pytorch.loggers.MLFlowLogger
    init_args:
      experiment_name: "Architecture"
      run_name: "SpatialNet-Small-5ch"
      tracking_uri: "file:./results/mlruns"
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: "val_loss"
        mode: "min"
        save_top_k: 1
        filename: "best-spatialnet-{epoch:02d}-{val_loss:.2f}"
    - class_path: src.callbacks.gpu_stats_monitor.GPUStatsMonitor
      init_args:
        device_index: 0
    - class_path: src.callbacks.audio_prediction_writer.AudioPredictionWriter
      init_args:
        output_dir: "results/predictions"
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: "val_loss"
        patience: 10
        mode: "min"
        verbose: True
    - class_path: src.callbacks.mlflow_auto_tag.MLflowAutoTagCallback
    - class_path: lightning.pytorch.callbacks.TQDMProgressBar
      init_args:
        refresh_rate: 10